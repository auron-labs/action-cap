name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  extension:
    name: Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-root-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-root-

      - run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

  cli:
    name: CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-cli-${{ hashFiles('packages/action-cap-cli/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-cli-

      - name: Install CLI dependencies
        working-directory: packages/action-cap-cli
        run: bun install --frozen-lockfile

      - name: Typecheck
        working-directory: packages/action-cap-cli
        run: bun run typecheck

      - name: Test
        working-directory: packages/action-cap-cli
        run: bun test
